name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: bunnydsp
          - os: windows-latest
            binary: bunnydsp.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev

      - run: npm ci
      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: src-tauri/target/release/${{ matrix.binary }}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NDK
        run: |
          yes | sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          npx tauri android build --debug

      - name: Rename APK for release
        run: mv src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk src-tauri/gen/android/app/build/outputs/apk/universal/debug/bunnydsp.apk

      - uses: actions/upload-artifact@v4
        with:
          name: bunnydsp-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/bunnydsp.apk

  release:
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bunnydsp/bunnydsp
            bunnydsp.exe/bunnydsp.exe
            bunnydsp-apk/bunnydsp.apk
