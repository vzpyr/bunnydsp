name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: bunnydsp
          - os: windows-latest
            binary: bunnydsp.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci
      - run: npm run build
      - run: cd src-tauri && cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: src-tauri/target/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bunnydsp/bunnydsp
            bunnydsp.exe/bunnydsp.exe
